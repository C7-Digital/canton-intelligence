<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

const BUCKETS = {
  'Core Crypto Infrastructure': ['Blockchain Infrastructure / Validator', 'General Web3 / Blockchain'],
  'DeFi & Trading': ['DeFi / Lending / Yield', 'Crypto Exchange / Trading Platform', 'Digital Asset Custody / Wallet'],
  'Digital Assets / Finance': ['Tokenization / RWA', 'Stablecoin / Payments', 'Asset Manager / Regulated Financial Services', 'Bank / TradFi Institution', 'Fintech'],
  'Data, Compliance & Security': ['Data & Analytics / Oracle', 'Identity / KYC / Compliance / RegTech', 'Security / Audit'],
  'Ecosystem Services': ['Consulting / Advisory / Professional Services', 'Venture / Investment', 'Technology / IT Company', 'Software / Tech / Developer Studio', 'AI / Automation', 'Education / Research'],
  'Other / Niche': ['NFT / Gaming / Social / Community', 'Carbon / Sustainability / ESG', 'Individual / Freelancer'],
};

const BUCKET_COLORS = {
  'Core Crypto Infrastructure': '#2b6cb0',
  'DeFi & Trading':             '#276749',
  'Digital Assets / Finance':   '#9b2c2c',
  'Data, Compliance & Security':'#7b6d1a',
  'Ecosystem Services':          '#553c9a',
  'Other / Niche':               '#2c5c5c',
};

const CAT_COLORS = {
  'Blockchain Infrastructure / Validator': '#3182ce',
  'General Web3 / Blockchain':            '#63b3ed',
  'DeFi / Lending / Yield':              '#38a169',
  'Crypto Exchange / Trading Platform':  '#48bb78',
  'Digital Asset Custody / Wallet':      '#68d391',
  'Tokenization / RWA':                  '#e53e3e',
  'Stablecoin / Payments':               '#fc8181',
  'Asset Manager / Regulated Financial Services': '#feb2b2',
  'Bank / TradFi Institution':           '#f56565',
  'Fintech':                             '#f687b0',
  'Data & Analytics / Oracle':           '#d69e2e',
  'Identity / KYC / Compliance / RegTech': '#ecc94b',
  'Security / Audit':                    '#f6e05e',
  'Consulting / Advisory / Professional Services': '#805ad5',
  'Venture / Investment':                '#9f7aea',
  'Technology / IT Company':             '#b794f4',
  'Software / Tech / Developer Studio':  '#d6bcfa',
  'AI / Automation':                     '#e9d8fd',
  'Education / Research':                '#c4b5fd',
  'NFT / Gaming / Social / Community':   '#2c7a7b',
  'Carbon / Sustainability / ESG':       '#319795',
  'Individual / Freelancer':             '#4a5568',
};

function getCatColor(cat) { return CAT_COLORS[cat] || '#6b7594'; }

function getBucket(cat) {
  for (const [b, cats] of Object.entries(BUCKETS)) {
    if (cats.includes(cat)) return b;
  }
  return 'Other / Niche';
}

// Build nodes
const nodes = Object.entries(RAW).map(([cat, companies]) => ({
  id: cat,
  count: companies.length,
  companies,
}));

const tooltip = document.getElementById('tooltip');

function showTooltip(evt, d) {
  tooltip.innerHTML = `<strong>${d.id}</strong><span>${d.count} participants</span>`;
  tooltip.classList.add('show');
  moveTooltip(evt);
}
function moveTooltip(evt) {
  tooltip.style.left = (evt.clientX + 14) + 'px';
  tooltip.style.top = (evt.clientY - 10) + 'px';
}
function hideTooltip() { tooltip.classList.remove('show'); }

let currentCat = null;

function showOverview() {
  currentCat = null;
  document.getElementById('company-view').classList.remove('visible');
  document.getElementById('company-view').innerHTML = '';
  document.getElementById('svg-container').style.display = '';
  document.getElementById('legend').style.display = '';
  document.querySelector('#breadcrumb .view-hint') && null;
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('bc-sep').style.display = 'none';
  document.getElementById('bc-cat').textContent = '';
  document.getElementById('view-hint').style.display = '';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showCategory(cat) {
  currentCat = cat;
  document.getElementById('svg-container').style.display = 'none';
  document.getElementById('legend').style.display = 'none';
  document.getElementById('view-hint').style.display = 'none';
  document.getElementById('bc-sep').style.display = '';
  document.getElementById('bc-cat').textContent = cat;
  document.getElementById('back-btn').classList.add('visible');

  const companies = RAW[cat];
  const cv = document.getElementById('company-view');
  cv.classList.add('visible');

  const cards = companies.map(c => {
    const hasUrl = c.url && c.url !== 'nan' && c.url.startsWith('http');
    const nameEl = hasUrl
      ? `<a href="${esc(c.url)}" target="_blank" rel="noopener" title="${esc(c.name)}">${esc(c.name)}</a>`
      : `<a title="${esc(c.name)}">${esc(c.name)}</a>`;
    const countryEl = c.country && c.country !== 'nan'
      ? `<div class="co-country">${esc(c.country)}</div>` : '';
    const descEl = c.desc && c.desc.trim()
      ? `<div class="co-desc">${esc(c.desc)}</div>` : '';
    return `<div class="company-card" data-name="${esc(c.name.toLowerCase())}">${nameEl}${countryEl}${descEl}</div>`;
  }).join('');

  cv.innerHTML = `
    <div class="company-header">
      <h2>${esc(cat)}</h2>
      <span class="cat-count-big">${companies.length} participants</span>
      <input id="search-box" type="text" placeholder="Search companies…" oninput="filterCompanies(this.value)">
    </div>
    <div class="company-grid" id="company-grid">${cards}</div>
  `;
}

window.filterCompanies = function(q) {
  const lq = q.toLowerCase();
  document.querySelectorAll('.company-card').forEach(card => {
    card.style.display = card.dataset.name.includes(lq) ? '' : 'none';
  });
};

// Draw bubble chart
function drawBubbles() {
  const container = document.getElementById('svg-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  d3.select('#svg-container').selectAll('*').remove();

  const svg = d3.select('#svg-container').append('svg')
    .attr('width', W).attr('height', H);

  const defs = svg.append('defs');

  // Background gradient
  const radialGrad = defs.append('radialGradient').attr('id', 'bgGrad')
    .attr('cx', '50%').attr('cy', '50%').attr('r', '70%');
  radialGrad.append('stop').attr('offset', '0%').attr('stop-color', '#0d1528').attr('stop-opacity', 1);
  radialGrad.append('stop').attr('offset', '100%').attr('stop-color', '#06080f').attr('stop-opacity', 1);
  svg.append('rect').attr('width', W).attr('height', H).attr('fill', 'url(#bgGrad)');

  // Glow filter
  const filter = defs.append('filter').attr('id', 'glow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
  filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
  const merge = filter.append('feMerge');
  merge.append('feMergeNode').attr('in', 'blur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');

  // Pack layout
  const pack = d3.pack()
    .size([W - 40, H - 40])
    .padding(14);

  const root = d3.hierarchy({ children: nodes })
    .sum(d => d.count ? Math.sqrt(d.count) * 8 : 0);

  pack(root);

  const g = svg.append('g').attr('transform', 'translate(20,20)');

  const bubbles = g.selectAll('.cat-bubble')
    .data(root.leaves())
    .join('g')
    .attr('class', 'cat-bubble')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer')
    .on('click', (evt, d) => showCategory(d.data.id))
    .on('mouseenter', (evt, d) => showTooltip(evt, d.data))
    .on('mousemove', moveTooltip)
    .on('mouseleave', hideTooltip);

  // Outer glow ring
  bubbles.append('circle')
    .attr('r', d => d.r + 5)
    .attr('fill', 'none')
    .attr('stroke', d => getCatColor(d.data.id))
    .attr('stroke-width', 1)
    .attr('opacity', 0.15);

  // Main fill circle
  bubbles.append('circle')
    .attr('class', 'bg')
    .attr('r', d => d.r)
    .attr('fill', d => getCatColor(d.data.id))
    .attr('fill-opacity', 0.18)
    .attr('stroke', d => getCatColor(d.data.id))
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.75)
    .attr('filter', 'url(#glow)');

  // Labels
  bubbles.each(function(d) {
    const el = d3.select(this);
    const r = d.r;
    const label = d.data.id.split(' / ')[0];
    const count = d.data.count;
    const fontSize = Math.max(9, Math.min(14, r / 4.5));

    if (r > 22) {
      const words = label.split(' ');
      const lineH = fontSize * 1.3;
      let lines = [], line = '';
      const maxW = r * 1.6;
      words.forEach(w => {
        const test = line ? line + ' ' + w : w;
        if (test.length * fontSize * 0.58 > maxW && line) {
          lines.push(line); line = w;
        } else { line = test; }
      });
      if (line) lines.push(line);

      const showCount = r > 35;
      const totalH = lines.length * lineH + (showCount ? lineH : 0);
      const startY = -totalH / 2 + lineH / 2;

      lines.forEach((ln, i) => {
        el.append('text')
          .attr('class', 'cat-label')
          .attr('y', startY + i * lineH)
          .attr('font-size', fontSize)
          .text(ln);
      });

      if (showCount) {
        el.append('text')
          .attr('class', 'cat-count')
          .attr('y', startY + lines.length * lineH + 2)
          .attr('font-size', Math.max(9, fontSize * 0.8))
          .text(count);
      }
    }
  });

  // Entrance animation
  g.selectAll('.cat-bubble circle.bg')
    .attr('r', 0)
    .transition().duration(700).delay((d, i) => i * 30).ease(d3.easeCubicOut)
    .attr('r', d => d.r);

  g.selectAll('.cat-bubble text')
    .attr('opacity', 0)
    .transition().duration(400).delay((d, i) => 400 + i * 30)
    .attr('opacity', 1);

  // Build legend
  const legend = document.getElementById('legend');
  legend.innerHTML = Object.entries(BUCKET_COLORS).map(([b, col]) =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${col}"></div>
      <span>${b}</span>
    </div>`
  ).join('');
}

drawBubbles();
window.addEventListener('resize', () => { if (!currentCat) drawBubbles(); });
</script>
