<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canton Network — Super Validator Power Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--surface:#0c1121;--surface2:#121a2e;--surface3:#1a2540;
  --border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7594;
  --gold:#c9a84c;--blue:#4c7fc9;--active:#4ec994;--escrow:#4c7fc9;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#app{display:flex;flex-direction:column;height:100vh}
#header{flex-shrink:0;padding:13px 24px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(6,8,15,.96);backdrop-filter:blur(12px);z-index:20}
#body{flex:1;display:flex;overflow:hidden}
#sidebar{width:290px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;position:relative;overflow:hidden}

/* HEADER */
.logo h1{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text)}
.logo p{font-size:9.5px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.hstats{display:flex;gap:20px}
.hstat{text-align:right}
.hstat-n{font-family:'DM Serif Display',serif;font-size:19px;color:var(--gold);line-height:1}
.hstat-l{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace}

/* SIDEBAR */
#filter-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ftab{flex:1;padding:8px 0;text-align:center;font-size:9.5px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.ftab:hover{color:var(--text)}
.ftab.active{color:var(--gold);border-bottom-color:var(--gold)}
#sv-list{flex:1;overflow-y:auto;padding:6px}
#sv-list::-webkit-scrollbar{width:3px}
#sv-list::-webkit-scrollbar-thumb{background:var(--border)}
.sv-item{padding:7px 10px;border-radius:4px;cursor:pointer;margin-bottom:2px;transition:.12s;border:1px solid transparent;position:relative}
.sv-item:hover{background:var(--surface);border-color:var(--border)}
.sv-item.selected{background:var(--surface2);border-color:var(--gold)}
.sv-item-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:60px}
.sv-item-meta{font-size:9.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.sv-item-badges{position:absolute;right:8px;top:7px;display:flex;gap:3px;align-items:center}
.sv-item-w{font-family:'DM Serif Display',serif;font-size:13px;line-height:1}
.sv-mini-bar{width:32px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:2px;overflow:hidden}
.sv-mini-fill{height:3px;background:var(--active);border-radius:2px}

/* DETAIL PANEL */
#detail{position:absolute;top:0;right:0;width:330px;height:100%;background:var(--surface);border-left:1px solid var(--border);padding:18px;overflow-y:auto;z-index:10;transform:translateX(100%);transition:transform .25s ease}
#detail.open{transform:translateX(0)}
#detail-close{position:absolute;top:11px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px}
#detail-close:hover{color:var(--text)}
.d-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.d-name{font-family:'DM Serif Display',serif;font-size:21px;color:var(--text);line-height:1.2;margin-bottom:4px}
.d-sector{font-size:11px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:5px}
.d-sector-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Weight breakdown */
.d-weight-block{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:14px}
.d-total-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.d-total-label{font-size:9px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.d-total-val{font-family:'DM Serif Display',serif;font-size:34px;color:var(--gold);line-height:1}
.d-pct{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.d-bar-track{background:rgba(255,255,255,.06);border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px;position:relative}
.d-bar-total{height:8px;border-radius:4px;position:absolute;left:0;top:0;opacity:.2}
.d-bar-active{height:8px;border-radius:4px;position:absolute;left:0;top:0;background:var(--active)}
.d-split-row{display:flex;gap:10px}
.d-split-item{flex:1}
.d-split-label{font-size:9px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px}
.d-split-val{font-size:14px;font-family:'DM Serif Display',serif}
.d-split-cip{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:4px}

.d-field{margin-bottom:9px}
.d-field-label{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.09em;margin-bottom:2px}
.d-field-val{font-size:11.5px;color:var(--text);line-height:1.45}
.d-field-val a{color:var(--blue);text-decoration:none}
.d-field-val a:hover{color:var(--gold)}
.d-node-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-family:'DM Mono',monospace;background:rgba(255,255,255,.07);color:var(--muted);margin-right:4px;margin-bottom:3px}
.d-commitments{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.d-commit-item{font-size:11px;color:#8892aa;padding:4px 0 4px 10px;border-left:2px solid;margin-bottom:3px;line-height:1.4}
.d-section-title{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;margin-top:12px}

/* SVG */
#chart{width:100%;height:100%}
.node{cursor:pointer}
.node text{pointer-events:none;dominant-baseline:central;text-anchor:middle}
.node .n-name{fill:white;font-family:'DM Sans',sans-serif;font-weight:500}
.node .n-weight{fill:rgba(255,255,255,.5);font-family:'DM Mono',monospace}

/* LEGEND */
#legend{position:absolute;bottom:14px;left:14px;pointer-events:none;display:flex;flex-direction:column;gap:10px}
.leg-card{background:rgba(12,17,33,.88);border:1px solid var(--border);border-radius:6px;padding:11px 13px;backdrop-filter:blur(8px)}
.leg-title{font-size:8.5px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.leg-title-icon{font-size:10px}
.leg-rows{display:flex;flex-direction:column;gap:3px}
.leg-row{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* HOW TO READ */
#reading-guide{position:absolute;top:54px;right:14px;width:200px;pointer-events:none;
  background:rgba(12,17,33,.88);border:1px solid var(--border);border-radius:6px;
  padding:12px 13px;backdrop-filter:blur(8px)}
.rg-title{font-size:8.5px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.rg-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.rg-row:last-child{margin-bottom:0}
.rg-svg{flex-shrink:0}
.rg-text{}
.rg-label{font-size:10px;font-weight:500;color:var(--text);line-height:1.3}
.rg-sub{font-size:8.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;line-height:1.3}
.rg-divider{border-top:1px solid var(--border);margin:8px 0}

/* STATUS LEGEND */
.sleg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.sleg-row:last-child{margin-bottom:0}
.sleg-badge{font-size:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;padding:1px 6px;border-radius:3px;flex-shrink:0}
.sleg-desc{font-size:9px;color:var(--muted);line-height:1.3}

/* VIEW TABS */
#view-tabs{position:absolute;top:13px;left:14px;display:flex;gap:5px;z-index:5}
.vtab{padding:4px 11px;font-size:9.5px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;border:1px solid var(--border);border-radius:3px;cursor:pointer;color:var(--muted);transition:.12s;background:rgba(6,8,15,.7);backdrop-filter:blur(8px)}
.vtab:hover{color:var(--text);border-color:var(--muted)}
.vtab.active{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.08)}

/* TABLE */
#table-view{display:none;width:100%;height:100%;overflow:auto;padding:18px}
#table-view table{width:100%;border-collapse:collapse;font-size:11.5px}
#table-view th{padding:7px 11px;text-align:left;font-size:8.5px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);cursor:pointer}
#table-view th:hover{color:var(--text)}
#table-view th.sort-asc::after{content:' ↑'}
#table-view th.sort-desc::after{content:' ↓'}
#table-view td{padding:6px 11px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text)}
#table-view tr:hover td{background:var(--surface)}
.t-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle}
.t-total{font-family:'DM Serif Display',serif;font-size:14px;color:var(--gold)}
.t-active{color:var(--active);font-family:'DM Mono',monospace;font-size:11px}
.t-escrow{color:var(--blue);font-family:'DM Mono',monospace;font-size:11px}
.t-cip{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--blue)}
.t-status{font-size:8.5px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em}
.s-final{background:rgba(78,201,148,.15);color:#4ec994}
.s-approved{background:rgba(76,127,201,.15);color:#63b3ed}
.s-founding{background:rgba(201,168,76,.15);color:var(--gold)}
.s-rejected{background:rgba(255,80,80,.1);color:#fc8181}
.t-node{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.diff-up{color:#fc8181;font-size:9px}
.diff-dn{color:#68d391;font-size:9px}
.diff-eq{color:var(--muted);font-size:9px}
</style>
</head>

// STATS

const active = SVS.filter(d=>d.status!=='Rejected' && d.liveWeight>0);
document.getElementById('stat-svs').textContent = SVS.filter(d=>d.status!=='Rejected').length;

// Exclude the GSF node itself from totals (it's a container for others)
const forStats = SVS.filter(d=>d.status!=='Rejected' && d.name!=='Digital Asset (GSF)');
const totalLive = forStats.reduce((s,d)=>s+d.liveWeight,0);
const totalActive = forStats.reduce((s,d)=>s+d.activeWeight,0);
document.getElementById('stat-total').textContent = Math.round(totalLive);
document.getElementById('stat-active').textContent = Math.round(totalActive/totalLive*100)+'%';
const sorted = [...forStats].sort((a,b)=>b.liveWeight-a.liveWeight);
const top5 = sorted.slice(0,5).reduce((s,d)=>s+d.liveWeight,0);
document.getElementById('stat-top5').textContent = Math.round(top5/totalLive*100)+'%';

// SIDEBAR
// ═══════════════════════════════════════════════════════════════
let sideFilter='all', selName=null;

function renderList(){
  const items = SVS
    .filter(d=>sideFilter==='all'||d.status===sideFilter)
    .filter(d=>d.name!=='Digital Asset (GSF)')
    .sort((a,b)=>b.liveWeight-a.liveWeight);
  document.getElementById('sv-list').innerHTML = items.map(d=>{
    const col = sc(d.sector);
    const frac = d.liveWeight>0 ? d.activeWeight/d.liveWeight : 0;
    return `<div class="sv-item ${selName===d.name?'selected':''}" onclick="selectSV('${d.name.replace(/'/g,"\\'")}')">
      <div class="sv-item-name">${d.name}</div>
      <div class="sv-item-meta">${d.cip.split(' ')[0]} &bull; ${d.sector.split('/')[0].trim()}</div>
      <div class="sv-item-badges">
        <div style="text-align:right">
          <div class="sv-item-w" style="color:${col}">${d.liveWeight.toFixed(d.liveWeight%1===0?0:2)}</div>
          <div class="sv-mini-bar"><div class="sv-mini-fill" style="width:${frac*100}%"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}
document.querySelectorAll('.ftab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    sideFilter=t.dataset.filter; renderList(); applyBubbleFilter(sideFilter);
  });
});

function applyBubbleFilter(f){
  if(document.getElementById('chart').style.display==='none') return;
  d3.selectAll('.node').style('opacity', d=>f==='all'||d.status===f ? 1 : 0.12);
}
renderList();

const statusClass = s=>({Final:'s-final',Approved:'s-approved',Founding:'s-founding',Rejected:'s-rejected'}[s]||'s-approved');

window.selectSV = function(name){
  selName = selName===name ? null : name;
  renderList();
  d3.selectAll('.node').classed('selected', d=>d.name===selName);
  if(!selName){closeDetail();return;}
  const d=SVS.find(x=>x.name===name);
  if(!d)return;
  const col=sc(d.sector);
  const tot=d.liveWeight; const act=d.activeWeight; const esc=tot-act;
  const pctTotal = d.name==='Digital Asset (GSF)' ? 100 : (tot/totalLive*100);
  const actFrac = tot>0 ? act/tot : 0;
  const cipDiff = d.cipMax!=null ? (tot - d.cipMax) : null;
  let diffHtml='';
  if(cipDiff!=null){
    const sign=cipDiff>0.005?'↑':cipDiff<-0.005?'↓':'=';
    const cls=cipDiff>0.005?'diff-up':cipDiff<-0.005?'diff-dn':'diff-eq';
    const abs=Math.abs(cipDiff).toFixed(2);
    diffHtml=`<span class="${cls}">${sign}${abs} vs CIP max</span>`;
  }
  document.getElementById('detail-content').innerHTML = `
    <span class="d-badge ${statusClass(d.status)}">${d.status}</span>
    <div class="d-name">${d.name}</div>
    <div class="d-sector"><div class="d-sector-dot" style="background:${col}"></div>${d.sector}</div>
    <div class="d-weight-block">
      <div class="d-total-row">
        <div><div class="d-total-label">Live Weight</div><div class="d-pct">${pctTotal.toFixed(1)}% of pool</div></div>
        <div style="text-align:right"><div class="d-total-val">${tot.toFixed(tot%1===0?1:4)}</div>${diffHtml}</div>
      </div>
      <div class="d-bar-track">
        <div class="d-bar-total" style="width:100%;background:${col}"></div>
        <div class="d-bar-active" style="width:${actFrac*100}%"></div>
      </div>
      <div class="d-split-row">
        <div class="d-split-item">
          <div class="d-split-label" style="color:var(--active)">● Active</div>
          <div class="d-split-val" style="color:var(--active)">${act.toFixed(act%1===0?1:4)}</div>
        </div>
        <div class="d-split-item">
          <div class="d-split-label" style="color:var(--escrow)">◌ Escrow</div>
          <div class="d-split-val" style="color:var(--escrow)">${esc.toFixed(esc%1===0?1:4)}</div>
        </div>
        ${d.cipMax!=null?`<div class="d-split-item"><div class="d-split-label">CIP Max</div><div class="d-split-val" style="color:var(--muted)">${d.cipMax.toFixed(d.cipMax%1===0?1:1)}</div></div>`:''}
      </div>
    </div>
    <div class="d-field"><div class="d-field-label">CIP</div><div class="d-field-val">${d.cip}</div></div>
    <div class="d-field"><div class="d-field-label">Author</div><div class="d-field-val">${d.author}</div></div>
    <div class="d-field"><div class="d-field-label">Approved</div><div class="d-field-val">${d.approved}</div></div>
    <div class="d-field"><div class="d-field-label">SV Node</div><div class="d-field-val"><span class="d-node-badge">${d.node}</span></div></div>
    ${d.url?`<div class="d-field"><div class="d-field-label">Website</div><div class="d-field-val"><a href="${d.url}" target="_blank">${d.url.replace('https://','')}</a></div></div>`:''}
    <div class="d-field"><div class="d-field-label">About</div><div class="d-field-val">${d.description}</div></div>
    <div class="d-commitments">
      <div class="d-section-title">Key Commitments / Notes</div>
      ${d.commitments.map(c=>`<div class="d-commit-item" style="border-color:${col}">${c}</div>`).join('')}
    </div>`;
  document.getElementById('detail').classList.add('open');
  document.getElementById('reading-guide').style.display='none';
};
window.closeDetail=function(){selName=null;document.getElementById('detail').classList.remove('open');document.getElementById('reading-guide').style.display='';d3.selectAll('.node').classed('selected',false);renderList();};

// BUBBLE CHART
// ═══════════════════════════════════════════════════════════════
let sim;
function drawBubbles(){
  const container=document.getElementById('chart');
  const W=container.clientWidth, H=container.clientHeight;
  d3.select('#chart').selectAll('*').remove();
  const svg=d3.select('#chart').attr('width',W).attr('height',H);
  const defs=svg.append('defs');
  const gr=defs.append('radialGradient').attr('id','bg3').attr('cx','50%').attr('cy','50%').attr('r','70%');
  gr.append('stop').attr('offset','0%').attr('stop-color','#0d1528');
  gr.append('stop').attr('offset','100%').attr('stop-color','#06080f');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#bg3)');
  const filt=defs.append('filter').attr('id','glow3').attr('x','-30%').attr('y','-30%').attr('width','160%').attr('height','160%');
  filt.append('feGaussianBlur').attr('stdDeviation','4').attr('result','blur');
  const m=filt.append('feMerge'); m.append('feMergeNode').attr('in','blur'); m.append('feMergeNode').attr('in','SourceGraphic');

  // Exclude GSF node from bubble chart (too large, distorts scale)
  const display = SVS.filter(d=>d.status!=='Rejected' && d.name!=='Digital Asset (GSF)');
  const rScale=d3.scaleSqrt().domain([0, d3.max(display,d=>d.liveWeight)]).range([0,Math.min(W,H)*0.1]);
  const nodes=display.map(d=>({...d, r:Math.max(d.liveWeight>0?8:4, rScale(d.liveWeight))}));

  if(sim) sim.stop();
  sim=d3.forceSimulation(nodes)
    .force('charge',d3.forceManyBody().strength(d=>-d.r*2.8))
    .force('collide',d3.forceCollide(d=>d.r+4).strength(0.88))
    .force('center',d3.forceCenter(W/2,H/2).strength(0.05))
    .force('x',d3.forceX(W/2).strength(0.04))
    .force('y',d3.forceY(H/2).strength(0.04))
    .alphaDecay(0.025)
    .on('tick',ticked);

  const g=svg.append('g');
  const node=g.selectAll('.node').data(nodes).join('g')
    .attr('class','node')
    .classed('selected',d=>d.name===selName)
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
    .on('click',(e,d)=>{e.stopPropagation();selectSV(d.name)});

  // Outer glow ring
  node.append('circle').attr('r',d=>d.r+5).attr('fill','none')
    .attr('stroke',d=>d.status==='Rejected'?'#fc8181':sc(d.sector))
    .attr('stroke-width',1).attr('opacity',.12);

  // Full circle (escrow portion — lighter)
  node.append('circle').attr('r',d=>d.r)
    .attr('fill',d=>d.liveWeight>0 ? sc(d.sector) : 'rgba(100,100,120,.2)')
    .attr('fill-opacity', d=>d.activeWeight===0&&d.liveWeight>0 ? 0.1 : 0.08)
    .attr('stroke',d=>d.liveWeight>0 ? sc(d.sector) : '#444')
    .attr('stroke-width',1.5)
    .attr('stroke-opacity',d=>d.liveWeight>0?0.6:0.3)
    .attr('stroke-dasharray',d=>d.activeWeight===0&&d.liveWeight>0?'4,3':'none')
    .attr('filter','url(#glow3)');

  // Active arc (filled segment proportional to activeWeight/liveWeight)
  node.each(function(d){
    const el=d3.select(this);
    if(d.activeWeight<=0||d.liveWeight<=0) return;
    const frac=d.activeWeight/d.liveWeight;
    if(frac>=0.999){
      el.append('circle').attr('r',d.r).attr('fill',sc(d.sector)).attr('fill-opacity',.22).attr('stroke','none');
    } else {
      const arc=d3.arc().innerRadius(0).outerRadius(d.r)
        .startAngle(-Math.PI/2).endAngle(-Math.PI/2 + frac*2*Math.PI);
      el.append('path').attr('d',arc()).attr('fill',sc(d.sector)).attr('fill-opacity',.25);
    }
  });

  // Labels
  node.each(function(d){
    const el=d3.select(this); const r=d.r;
    const fs=Math.max(7,Math.min(12,r/4.5));
    if(r<10) return;
    const parts=d.name.split(' ');
    const lh=fs*1.3, maxW=r*1.75;
    let lines=[],ln='';
    parts.forEach(w=>{
      const t=ln?ln+' '+w:w;
      if(t.length*fs*.56>maxW&&ln){lines.push(ln);ln=w;}else ln=t;
    });
    if(ln) lines.push(ln);
    const showW=r>24;
    const totalH=lines.length*lh+(showW?lh*0.85:0);
    const sy=-totalH/2+lh/2;
    lines.forEach((l,i)=>el.append('text').attr('class','n-name').attr('y',sy+i*lh).attr('font-size',fs).text(l));
    if(showW) el.append('text').attr('class','n-weight').attr('y',sy+lines.length*lh).attr('font-size',Math.max(7,fs*.8))
      .text(d.liveWeight.toFixed(d.liveWeight%1===0?0:1));
  });

  function ticked(){
    node.attr('transform',d=>`translate(${Math.max(d.r,Math.min(W-d.r,d.x))},${Math.max(d.r,Math.min(H-d.r,d.y))})`);
  }

  node.select('circle').attr('r',0).transition().duration(700).delay((_,i)=>i*15).ease(d3.easeCubicOut).attr('r',d=>d.r);
  node.selectAll('text').attr('opacity',0).transition().duration(400).delay((_,i)=>400+i*15).attr('opacity',1);
  svg.on('click',()=>closeDetail());
}
drawBubbles();

// ═══════════════════════════════════════════════════════════════
// TABLE
// ═══════════════════════════════════════════════════════════════
let sortCol='liveWeight',sortDir=-1;
const display4Table = SVS.filter(d=>d.name!=='Digital Asset (GSF)');

function renderTable(){
  const rows=[...display4Table].sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    return typeof av==='number' ? sortDir*(av-bv) : sortDir*String(av).localeCompare(String(bv));
  });
  const th=(col,label)=>`<th onclick="setSort('${col}')" class="${sortCol===col?(sortDir>0?'sort-asc':'sort-desc'):''}">${label}</th>`;
  document.getElementById('table-view').innerHTML=`<table>
    <thead><tr>${th('name','Name')}${th('liveWeight','Live Wt')}${th('activeWeight','Active')}${th('cipMax','CIP Max')}${th('status','Status')}${th('sector','Sector')}${th('cip','CIP')}${th('approved','Approved')}</tr></thead>
    <tbody>${rows.map(d=>{
      const cipDiff=d.cipMax!=null?(d.liveWeight-d.cipMax):null;
      const diffStr=cipDiff!=null?(Math.abs(cipDiff)<0.01?'—':(cipDiff>0?`<span class="diff-up">↑${cipDiff.toFixed(2)}</span>`:`<span class="diff-dn">↓${Math.abs(cipDiff).toFixed(2)}</span>`)): '—';
      return `<tr onclick="selectSV('${d.name.replace(/'/g,"\\'")}')">
        <td><span class="t-dot" style="background:${sc(d.sector)}"></span>${d.name}</td>
        <td><span class="t-total">${d.liveWeight.toFixed(d.liveWeight%1===0?1:2)}</span></td>
        <td><span class="t-active">${d.activeWeight.toFixed(d.activeWeight%1===0?1:2)}</span> <span class="t-escrow">${(d.liveWeight-d.activeWeight)>0?'+'+(d.liveWeight-d.activeWeight).toFixed(2)+' escrow':''}</span></td>
        <td>${d.cipMax!=null?d.cipMax+' '+diffStr:'—'}</td>
        <td><span class="t-status ${statusClass(d.status)}">${d.status}</span></td>
        <td style="color:var(--muted);font-size:10.5px">${d.sector}</td>
        <td><span class="t-cip">${d.cip.split(' ')[0]}</span></td>
        <td style="font-size:10.5px;color:var(--muted)">${d.approved}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}
window.setSort=function(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}renderTable();};

// VIEW SWITCH

document.querySelectorAll('.vtab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.vtab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  const v=t.dataset.view;
  document.getElementById('chart').style.display=v==='bubble'?'':'none';
  document.getElementById('legend').style.display=v==='bubble'?'':'none';
  document.getElementById('reading-guide').style.display=v==='bubble'?'':'none';
  const tv=document.getElementById('table-view');
  if(v==='table'){tv.style.display='block';renderTable();}else{tv.style.display='none';}
}));
window.addEventListener('resize',()=>{if(document.getElementById('chart').style.display!=='none'){drawBubbles();applyBubbleFilter(sideFilter);}});
